<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Garmin PRG WebBLE Sender</title>
    <link rel="stylesheet" href="./styles.css?v=20260723-bridge-diagnostics">
    <script src="https://beacio.com/beacio.js"></script>
    <script type="module" src="./app.js?v=20260723-access-mode-ladder"></script>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1>Garmin PRG Sender</h1>
          <p class="muted">WebBLE direct staging</p>
        </div>
        <span id="bleState" class="badge">checking</span>
      </header>

      <section class="panel">
        <label class="label" for="fileInput">PRG file</label>
        <input id="fileInput" type="file" accept=".prg,application/octet-stream">
        <div id="fileMeta" class="meta">No file selected</div>
      </section>

      <section class="panel">
        <label class="label" for="apiModeInput">Bluetooth API</label>
        <select id="apiModeInput">
          <option value="webble-first" selected>iOSWebBLE first</option>
          <option value="bluetooth-first">Standard first</option>
          <option value="webble-only">iOSWebBLE only</option>
          <option value="bluetooth-only">Standard only</option>
        </select>
        <label class="label" for="pickerModeInput">Picker mode</label>
        <select id="pickerModeInput">
          <option value="name" selected>Name filter: fenix 6 Pro</option>
          <option value="garmin">Garmin filter</option>
          <option value="broad">Broad picker</option>
        </select>
        <label class="label" for="serviceModeInput">Access mode</label>
        <select id="serviceModeInput">
          <option value="transport" selected>Garmin transport services</option>
          <option value="v2">GFDI v2 only</option>
          <option value="grant">Grant only, no services</option>
          <option value="full">Full diagnostics services</option>
        </select>
        <div class="bridge-box">
          <div>
            <div class="mini-label">Bridge diagnostics</div>
            <div id="bridgeDiagnosticsText" class="mono">Checking bridge state...</div>
          </div>
          <button id="bridgeDiagnosticsButton" type="button" class="secondary">Log Bridge State</button>
        </div>
        <div class="row">
          <button id="chooseWatchButton" type="button">Choose Watch</button>
          <button id="connectButton" type="button" disabled>Connect</button>
        </div>
        <div id="watchMeta" class="meta">No watch selected</div>
        <div id="watchIdentity" class="identity" hidden>
          <div>
            <div class="mini-label">Selected device</div>
            <div id="deviceIdText" class="mono">-</div>
            <div id="transportText" class="meta">Not connected</div>
          </div>
          <label class="confirm-target">
            <input id="confirmTargetInput" type="checkbox">
            <span>Confirm target watch</span>
          </label>
        </div>
        <div class="trusted-watch">
          <div>
            <div class="mini-label">Trusted watch</div>
            <div id="trustedWatchText" class="mono">None saved</div>
          </div>
          <div class="trusted-actions">
            <button id="rememberWatchButton" type="button" class="secondary" disabled>Remember</button>
            <button id="clearWatchButton" type="button" class="secondary" disabled>Clear</button>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="row">
          <button id="scanButton" type="button">Scan 20s</button>
          <button id="stopScanButton" type="button" disabled>Stop Scan</button>
        </div>
        <div id="scanSummary" class="meta">No scan run yet</div>
      </section>

      <section class="panel">
        <div class="settings">
          <label>
            <span>GFDI packet</span>
            <input id="packetSizeInput" type="number" min="64" max="375" step="1" value="375">
          </label>
          <label>
            <span>BLE fragment</span>
            <input id="fragmentSizeInput" type="number" min="20" max="180" step="1" value="20">
          </label>
          <label>
            <span>Write delay ms</span>
            <input id="writeDelayInput" type="number" min="0" max="25" step="1" value="0">
          </label>
        </div>
        <button id="sendButton" class="primary" type="button" disabled>Send PRG</button>
        <div class="progress-row">
          <progress id="progressBar" max="100" value="0"></progress>
          <span id="progressText">0%</span>
        </div>
        <div id="statusText" class="status">Ready</div>
      </section>

      <section class="panel details">
        <button id="detailsButton" type="button" class="secondary">Show Details</button>
        <pre id="log" hidden></pre>
      </section>
    </main>
  </body>
</html>
